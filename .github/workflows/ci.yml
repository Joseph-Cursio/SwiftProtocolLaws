name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: swift test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Clean
        run: swift package clean
      - name: Test
        run: swift test --parallel
