name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Run tests
        run: swift test --no-parallel

  build-apple:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: generic/platform=iOS
          - platform: tvOS
            destination: generic/platform=tvOS
          - platform: watchOS
            destination: generic/platform=watchOS
          - platform: visionOS
            destination: generic/platform=visionOS
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build ProtocolLawKit
        run: |
          xcodebuild build \
            -scheme ProtocolLawKit \
            -destination '${{ matrix.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
      - name: Build ProtoLawMacro
        run: |
          xcodebuild build \
            -scheme ProtoLawMacro \
            -destination '${{ matrix.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
